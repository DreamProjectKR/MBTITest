      data-asset-href="assets/images/favicon.png"
      type="image/x-icon"
    />

      type="module"
      src="./scripts/config.js?v=3"
      defer
      data-cfasync="false"
    ></script>
    <script
      src="./scripts/layout.js"
      defer
      data-cfasync="false"
    ></script>
  </head>

  <body>
    <div class="PageShell testlistPageShell">
      <header class="Sticky">
        <div
          class="Head"
          data-include="header"
          data-include-src="partials/header.html"
        ></div>
      </header>
      <main class="TestIntroShell">
        <div class="IntroShellImg">
          <img
            alt="테스트 썸네일"
            width="350"
            height="400"
            decoding="async"
            fetchpriority="high"
          />
          <div class="NewTestHashTag">
            <span class="HashTag">#태그</span>
          </div>
        </div>
        <div class="IntroShellTextBox">
          <h2>테스트 이름</h2>
          <div class="Creator">
            <img
              alt="제작자 이미지"
              width="24"
              height="24"
              decoding="async"
            />
            <p class="CreatorName">제작자 이름</p>
          </div>
          <div class="IntroDescription">테스트 설명</div>
          <div class="IntroBtnShell">
            <div class="TestStart">
              <button type="button">
                <img
                  data-asset-src="assets/images/TestStart.png"
                  data-asset-resize="width=292,quality=90,format=webp"
                  alt="테스트 시작버튼"
                  decoding="async"
                />
              </button>
            </div>
            <div class="TestShare">
              <button type="button">
                <img
                  data-asset-src="assets/images/TestShare.png"
                  data-asset-resize="width=292,quality=90,format=webp"
                  alt="테스트 공유버튼"
                  decoding="async"
                />
              </button>
            </div>
          </div>
        </div>
      </main>
      <footer>
        <div
          data-include="footer"
          data-include-src="partials/footer.html"
        ></div>
      </footer>
    </div>

    <!-- Start preloading overlay (shown only when user clicks Start) -->
    <div
      id="preloadOverlay"
      class="preload-overlay"
      aria-hidden="true"
    >
      <div
        class="preload-skeleton"
        role="status"
        aria-live="polite"
      >
        <div class="skeleton-image"></div>
        <div
          class="skeleton-progress"
          aria-hidden="true"
        >
          <div
            class="skeleton-progress-bar"
            data-preload-progress
          ></div>
        </div>
        <p
          class="skeleton-text"
          data-preload-text
        >
          테스트 준비 중...
        </p>
      </div>
    </div>
  </body>

  <script
    type="module"
    src="./scripts/testintro.js"
    data-cfasync="false"
    crossorigin="anonymous"
  ></script>
</html>

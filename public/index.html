      // Local dev: disable preloads to avoid noisy "preloaded but not used" warnings
      // when dev tooling or delayed attribute hydration changes timing.
      (function () {
        var h = location.hostname;
        if (h === "localhost" || h === "127.0.0.1") {
          document
            .querySelectorAll('link[rel="preload"][data-skip-local="true"]')
            .forEach(function (el) {
              el.parentNode && el.parentNode.removeChild(el);
            });
        }
      })();

        <div class="MainBanner">
          <a href="./testlist.html">

              src="/cdn-cgi/image/width=1230,quality=85,fit=cover,format=auto/assets/images/mainbanner.png"

              data-asset-resize="width=1230,quality=85,fit=cover,format=auto"
              data-asset-srcset="480,768,1230"
              data-asset-sizes="(max-width: 900px) 100vw, 1230px"
              alt="테스트 리스트로 바로가기"

              fetchpriority="high"
            />

          <div class="NewTestListShell">
